body:
  text: 開府儀同三司特進試鴻臚卿肅國公食邑三千戶賜紫贈司空諡大鑒正號大廣智大興善寺三藏沙門不空奉詔譯我今順瑜伽金剛頂經説摩尼蓮花部如意念誦法修此三昧故能如觀自在先擇其弟子族姓敬法者多人所敬愛智慧而勇進決定毗離耶覺慧常不捨盡孝於父母淨信於三寶樂修菩提行於四無量心剎那無有間常樂大乘法住於菩薩戒恭敬阿闍梨一切諸聖者成就堅固力丈夫之勇猛善通相應門常樂寂靜行智慧無所畏以戒常嚴身精修祕密乘敬依理趣道一心無所吝常樂聞妙法曾入三昧耶從師獲灌頂既蒙印可已不久當成就弟子具此相方可為傳授此即如意寶能成諸事業如經説處所山間及流水清淨阿蘭若隨樂之澗谷離諸危怖難隨力嚴供具行人面於西漫提自在王次禮餘方佛以五輪著地如教之敬禮雙膝長跪已合掌虛心住誠心盡陳説三業一切罪我從過去世流轉於生死今對大聖尊盡心而懺悔如先佛所懺我今亦如是願承加持力衆生悉清淨以此大願故自他獲無垢密言曰唵薩婆婆嚩輸馱薩婆達麼薩嚩婆嚩輸度唅行者次應隨喜一切諸佛菩薩所集福智思一切佛菩薩過去所修行功德如我自作而生歡喜過現三世佛菩薩及衆聖所集諸善根合掌盡隨喜如我身所集歡喜無有異次應右膝著地芙蓉合掌置於頂上想禮一切如來菩薩足密言曰唵鉢頭麼二合微微古反禮諸佛已全跏半跏或輪王跏隨意而坐作此坐印已觀遍虛空佛己身各於前住彼衆聖會止觀從膝上旋舞當心合如蓮之未敷想禮於諸佛次結三昧耶當心堅固縛檀慧禪智竪金剛蓮花印通持蓮花者警覺衆聖已誦此密言曰唵跋折羅鉢頭麼三麼耶薩怛梵三合由結此印故佛及善逝子諸大名稱者妙觀察攝受憶昔本誓願對於遍照尊不違教令故加持使圓滿次結一切諸佛如來安悅意歡喜三昧耶印十度堅固縛忍願中交合檀慧與禪智各相合而竪密言曰唵三麼耶乎去引蘇囉多薩怛梵三合由示此印故諸佛及菩薩一切執金剛皆悉妙歡喜次當開心戶入金剛智字觀於二乳上右怛囉左吒如宮室戶扇殊勝金剛縛三業同時發拍心開兩字密言曰唵跋日囉二合滿馱平怛羅二合吒半音無始熏種子所集之塵勞今以召罪印集之欲摧碎十度堅固縛忍願伸如針進力屈如鉤心想召諸罪想彼衆罪狀植髮裸黑形及印刺於心觸已誦密語三業相應故能召諸罪積誦此召集已方作摧碎法密言曰唵薩婆播波迦哩灑拏尾入輸馱入娜三摩耶跋日囉二合吽若入召入於掌已方作摧碎法前印內相叉稱𤚥縛諸罪忍願俱伸直有怛囉吒字想為金剛杵相拍如摧山忿句及怒形能淨諸惡趣誦已忍願拍三七隨所宜密言曰唵跋日囉二合播尼尾薩普吒也薩婆播也滿馱娜儞鉢囉二合母乞灑二合也薩婆播也蘖底丁以反避藥二合重呼薩婆薩怛挽薩婆怛他蘖多跋日囉二合三磨也吽怛囉二合吒半音以此相應故先佛方便説三業所積罪無量極重障作此摧滅已如火焚枯草有情常愚迷不知此理趣如來大悲故開此祕妙門次當結入印內如來智字二羽堅固縛禪智入於中以進力二度相拄如環勢觀前八葉蓮其上置阿字二點嚴飾故妙字方名阿色白如珂雪流散千光明想以進力支捻字安心內三業齊運用誦此密言曰唵跋日囉二合阿引味捨平聲惡入既想入心中字相逾光耀此即法界體行者應是觀不久悟寂靜法本不生故三世諸如來金剛身口意皆以妙方便持在金剛拳以此闔心門智字獲堅固便屈進力度住於禪智背以印觸胸已即誦此妙言唵跋日囉二合母瑟致𤚥行者住等引二羽堅固縛仰置於臍下禪智蓮花形此名三昧印誦此密言曰唵三摩地鉢頭迷二合紇哩短出息及入息住阿那波那想佛遍虛空彈指警覺我佛子汝云何成無上等覺不知諸如來實相之妙法既聞警覺已行者復白言云何名真實願最勝尊説諸佛皆歡喜作如是勝言善哉摩訶薩能作如是問汝想於心中所內惡字門以字徹於心誦此密言曰唵止入多鉢囉二合底平味鄧迦路弭當默誦一遍便想為月輪倍欲精進故復誦妙言曰唵步提止入多母去怛跛二合陀夜弭平能令心月輪圓滿甚清淨中想妙蓮花上安寶金剛密言曰唵底瑟奼麼尼上跋日囉二合鉢娜麼二合引量同虛空周遍於三界復誦此妙言金剛語離聲唵薩頗二合上囉麼尼上跋日囉二合鉢娜麼二合於此引妙蓮流放千光焰一一光明中無量佛剎土剎中有妙蓮想持寶蓮者持寶蓮勝幢幢中出妙聲誰有薄福者當滿一切願住是寂三昧為利諸有情如是菩薩類皆住於等引從蓮花胎藏放千妙光明皆為利衆生檀波羅蜜等遍入諸三昧理趣善巧門為愍念有情作無量方便化身為種種從生及涅槃轉大妙法輪皆從意寶出所説之妙法皆以輪成就以輪為妙智能斷諸結使由轉妙法輪此為福智路次皆正觀察漸斂其智蓮密言曰唵僧訶囉麼尼跋日囉二合鉢娜麼所在諸如來皆入為一體猶如於明鏡能現於萬像法界自性體住於金剛蓮即變其寶蓮為真多菩薩手持如意寶六臂身金色皆想於自身頂髻寶莊嚴冠坐自在王住於説法相第一手思惟愍念有情故第二持意寶能滿一切願第三持念珠為度傍生苦左按光明山成就無傾動第二持蓮手能淨諸非法第三挈輪手能轉無上法六臂廣博體能遊於六道以大悲方便斷諸有情苦行者如是觀坐於月輪中身流千光明項背皆圓光復想心月輪亦有寶蓮花以是能堅固無動觀已身為離諸妄想誦此密言曰唵儞哩二合茶去底瑟姹二合囉怛娜跋日囉二合鉢娜麼二合怛麼二合句唅三摩喻唅摩訶三摩喻唅薩婆怛他孽多避三菩地囉怛娜跋日囉二合鉢娜麼二合怛麼二合句唅以此法如持十度芙蓉合進力屈如寶印心額喉頂吽字想於心怛囉安於額訖哩當喉上惡字置於頂猶布此想故此身如金剛復誦此密語蓮花語為聲唵囉怛娜跋日囉二合達磨紇哩二合次應結灌頂智者合蓮掌進力如寶形禪智開相遠置額誦密語心想佛灌頂唵鉢娜麼二合苾哩俱胝多入致囉怛娜鉢娜麼二合避入囇罽囉阿避詵去者𤚥怛洛即以此妙印二手分兩邊如繫蓮花鬘徐徐前下散想垂白帶勢誦此妙言曰唵鉢娜麼二合麼隸平𤚥紇哩怛洛次當結甲鎧二手蓮花形從心繞向背從背當臍繞向腰及兩膝漸上繞頸後從頸復當喉復於頭後繞還來至額上却於頂後繞徐徐前下散誦此祕密言唵阿婆曳平鉢娜麼二合迦𤚥嚩制平滿馱囉託灑二合𤚥吽合口唅平為喜諸佛故應拍蓮花印二手結蓮掌妙拍令歡喜密言曰唵鉢娜麼二合覩使縠引想於己身前觀紇哩字門變為蓮花王中有紇哩字怛囉安兩邊為金剛寶蓮共變為所尊持真多妙寶如前己身觀今所觀亦然為令體無二次作呼召法十度未敷蓮進力如鉤勢即誦此密語應為蓮花音唵鉢娜麼二合摯拏那二合下同曩長口引句捨吽合口引唵鉢娜麼二合枳惹二合娜補瑟比吽行者既召己次當結索印如前合蓮掌進力拄如環此名蓮花索能滿諸意願應誦此密語召入於智身唵鉢娜麼二合至拏那阿母伽跛捨吽合口引既入於智身為令無傾動復當結蓮鎖應作決定心如前合蓮掌進禪捻如環力智亦復然相結如鉤鎖唵鉢娜麼二合至拏那塞怖二合吒吽為令妙歡喜結蓮花鈴印當以蓮花捧禪智入掌中進力如環住誦此祕密語唵至拏娜鉢娜麼二合阿尾捨耶吽次當誦蓮花百字祕密言捧獻閼伽水以鬱金白檀龍腦兼諸花兩手捧供養唵鉢娜麼二合薩怛嚩二合三摩也平麼努播羅去也平鉢娜麼二合薩怛嚩二合帝尾二合努波底瑟姹二合儞哩二合拏護二合寐平婆嚩素覩瑟諭二合寐婆嚩阿努囉矩覩寐婆嚩素補瑟諭二合寐婆嚩薩婆悉地弭異二合鉢羅也磋昌苛反薩婆羯麼素者迷止多室利二合藥矩路三合吽合口引訶去下同訶訶訶穀婆伽梵薩婆怛他孽多鉢娜麼二合麼寐悶者平鉢娜寐婆嚩麼訶三麼也薩怛嚩二合紇哩二合次以內外供供養蓮花王所謂內供養芙蓉掌當心禪智並伸直名為蓮花喜應誦此密言唵摯拏二合那鉢娜麼二合囉細引吽次結花鬘印以此而供養不易前喜印二手捧向前想種種寶鬘遍滿虛空界密言曰唵摯拏二合娜鉢娜麼二合麼隸吽次應以歌印奉獻智蓮者復以前妙印屈掌挂諸度從臍漸至口散下如寫勢想緊那羅音供養諸聖者密言曰唵摯拏二合那鉢娜麼二合擬研以反帝平吽次應結舞印前印左右旋合芙蓉妙掌安於頂上散由是四供養能獲大神通密言曰唵摯拏二合娜鉢娜麼二合儞俚二合帝平吽作此四供養能成最勝事次結外供養喜心而獻之運心無邊界蓮花焚香法諸佛誠言説為利諸有情蓮掌向下散猶如焚香勢誦此祕密言想香雲供養周遍虛空界供養諸聖衆唵鉢娜麼二合摯拏二合娜度閉平吽次應結花印以三十二相莊嚴諸如來觀妙色花雲運心遍一切如前合蓮掌上散如花勢供養諸如來及諸善逝子想滿虛空界花雲妙芬馥寶樹極端嚴誦此祕密語三業齊運用唵鉢娜麼二合摯拏二合娜補瑟閉平吽衆生無明覆離於智慧光為彼淨除故應結智燈印以前蓮花掌禪智竪相逼心想麼尼燈遍照虛空界所出無量光誦此密言曰唵鉢娜麼二合摯拏二合那儞儞熠反閉吽智者次應結解脫塗香印為淨衆生故獻此尸羅香二手散蓮掌當心塗香勢十度成熏習香海遍虛空獻佛及所尊誦此祕密語唵鉢娜麼二合摯拏二合娜巘提吽內外供養已然後應順念結祕密本印以對密言王先誦根本言分明七遍已平掌當於心忍願如蓮花進力摩尼狀餘度盡如幢誦根本密言思滿有情願密言曰娜麼囉怛娜怛囉夜也那莫阿唎耶嚩嚕吉帝濕伐囉耶菩地薩怛嚩二合耶麼訶薩怛嚩二合耶麼訶迦嚕尼迦耶怛姪儞也反他唵斫迦囉靺低真多末尼麼訶鉢娜迷嚕嚕底丁以反瑟姹二合入嚩攞阿迦哩灑二合耶吽發吒薩嚩二合訶次結心祕密依前根本印戒方檀慧縛名為本心印一切諸意願應心之所念由結此印故皆悉得成就密言曰唵鉢那迷真多麼抳入嚩攞吽次結隨心印二手堅固縛進力摩尼形禪智並而申戒方亦舒直檀慧相交竪誦此心中心密言曰唵末囉娜鉢娜迷吽次想尊口中流出祕密言分明成字道五色光照耀間錯殊勝色入於瑜岐口列心月輪中瑩如紅頗黎一一諦思惟順理隨覺悟住定而修習入於阿字門即入輪字觀皆遍觀諸字此名三昧念獲智及解脫由此相應故不久成種智若常聲順念最勝妙奇特住於本尊觀不應急躁心不高亦不下不緩亦不急智者離分別及諸妄想心若誦洛叉遍所求皆悉地二手持念珠頗胝與蓮子螺珠及餘寶無瑕光好者當穿一百八一一誦七遍心及心中心或毗俱多羅作此法加持穿貫珠鬘已當心一一度與莎訶齊聲一千與百八隨力而念誦四時或三時此法後夜勝如意輪經中本教佛所説若如是修習現世證初地過此十六生成無上菩提何況世悉地現生不如意隨力念誦已重結三昧耶復為八供養發遣密言主二羽堅固縛忍願蓮葉形從心至面散頂上合花掌想尊虛空中復道還宮去密言曰唵鉢娜麼二合薩怛嚩二合紇哩穆發遣聖者已自住本尊觀或於間靜處轉讀摩訶衍楞伽與花嚴般若及理趣如是等經教思惟而修習誦讀經典已自恣行住坐乃至於寢息不間菩提心不久當悉地金剛藏所説此大悲軌儀不擇日及宿時食與澡浴若淨與不淨常應不間斷遠離於散亂空間寂靜處不營諸世務念畢發誓願結三昧耶印禮佛菩薩已隨意而經行
